<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Mon Assistant Codes - Accueil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    position: relative;
    overflow-x: hidden;
}

/* Animation des particules en arrière-plan */
.particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
}

.particle {
    position: absolute;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    animation: float 8s infinite ease-in-out;
}

@keyframes float {
    0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
    }
    10% {
        opacity: 0.5;
    }
    90% {
        opacity: 0.5;
    }
    100% {
        transform: translateY(-20vh) rotate(360deg);
        opacity: 0;
    }
}

/* Conteneur principal */
.container-main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 20px;
}

/* Carte principale */
.welcome-card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 32px;
    padding: 40px 25px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
    animation: fadeInUp 0.8s ease-out;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Icône animée */
.animated-icon {
    font-size: 70px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: pulse 2s infinite;
    margin-bottom: 20px;
}

@keyframes pulse {
    0% {
        transform: scale(1);
        opacity: 0.8;
    }
    50% {
        transform: scale(1.1);
        opacity: 1;
    }
    100% {
        transform: scale(1);
        opacity: 0.8;
    }
}

/* Titre */
.main-title {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 15px;
}

/* Texte de bienvenue */
.welcome-text {
    color: #6c757d;
    font-size: 1rem;
    margin-bottom: 30px;
    line-height: 1.6;
}

/* Boutons */
.btn-custom {
    border-radius: 50px;
    padding: 15px 20px;
    font-weight: 600;
    font-size: 1.1rem;
    transition: all 0.3s ease;
    border: none;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    display: inline-block;
    text-align: center;
    text-decoration: none;
}

.btn-custom::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

.btn-custom:hover::before {
    width: 300px;
    height: 300px;
}

.btn-custom:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

.btn-custom:active {
    transform: translateY(0);
}

.btn-article {
    background: linear-gradient(135deg, #11998e, #38ef7d);
    color: white;
}

.btn-balance {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
}

.btn-article i, .btn-balance i {
    margin-right: 12px;
    font-size: 1.2rem;
}

/* Effet de brillance sur les boutons */
.btn-custom::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
        to bottom right,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.1) 50%,
        rgba(255, 255, 255, 0) 100%
    );
    transform: rotate(45deg);
    animation: shine 3s infinite;
}

@keyframes shine {
    0% {
        transform: translateX(-100%) rotate(45deg);
    }
    20%, 100% {
        transform: translateX(100%) rotate(45deg);
    }
}

/* Footer */
.custom-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    color: rgba(255, 255, 255, 0.9);
    text-align: center;
    padding: 12px;
    font-size: 0.85rem;
    z-index: 10;
    font-weight: 500;
    letter-spacing: 0.5px;
}

.custom-footer strong {
    color: #ffd700;
    font-weight: 600;
}

/* Animation de chargement */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    flex-direction: column;
    display: none;
}

/* Responsive */
@media (max-width: 480px) {
    .welcome-card {
        padding: 30px 20px;
    }
    
    .main-title {
        font-size: 1.6rem;
    }
    
    .btn-custom {
        padding: 12px 16px;
        font-size: 1rem;
    }
    
    .animated-icon {
        font-size: 55px;
    }
    
    .custom-footer {
        font-size: 0.7rem;
        padding: 8px;
    }
}

/* Effet ripple */
.ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.5);
    transform: scale(0);
    animation: ripple-animation 0.6s linear;
    pointer-events: none;
}

@keyframes ripple-animation {
    to {
        transform: scale(4);
        opacity: 0;
    }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-border text-light mb-2" role="status"></div>
    <h5>Chargement...</h5>
</div>

<div class="particles" id="particles"></div>

<!-- Conteneur principal où le contenu sera chargé dynamiquement -->
<div id="app-content"></div>

<footer class="custom-footer">
    <i class="fa-regular fa-copyright me-1"></i> Application développée par : <strong>M.Seddik ELidrissi</strong>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ============ ROUTER.JS ============
// Router pour navigation sans afficher les fichiers .html dans l'URL

(function() {
    // Configuration des routes
    const routes = {
        '/': 'index.html',
        '/accueil': 'index.html',
        '/articles': 'ca.html',
        '/balance': 'cb.html'
    };
    
    let currentContent = null;
    
    // Fonction pour afficher/masquer le loader
    function showLoader(show) {
        const loader = document.getElementById('loadingOverlay');
        if (loader) {
            loader.style.display = show ? 'flex' : 'none';
        }
    }
    
    // Fonction pour charger le contenu
    async function loadContent(path) {
        // Normaliser le chemin
        if (path === '' || path === '/') path = '/';
        
        let route = routes[path];
        if (!route) {
            // Si route non trouvée, rediriger vers l'accueil
            route = 'index.html';
            path = '/';
        }
        
        showLoader(true);
        
        try {
            const response = await fetch(route);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const html = await response.text();
            
            // Extraire le contenu du body
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Récupérer le contenu du body
            let newContent = doc.body.innerHTML;
            
            // Si c'est index.html, extraire le contenu de l'app-content ou body
            if (route === 'index.html') {
                // Pour l'accueil, on garde le contenu principal
                const appDiv = doc.querySelector('#app-content');
                if (appDiv) {
                    newContent = appDiv.innerHTML;
                }
            }
            
            // Mettre à jour le contenu
            const appContainer = document.getElementById('app-content');
            if (appContainer) {
                appContainer.innerHTML = newContent;
            }
            
            // Récupérer et exécuter les nouveaux scripts
            const scripts = doc.querySelectorAll('script');
            scripts.forEach(oldScript => {
                if (oldScript.src) {
                    const newScript = document.createElement('script');
                    newScript.src = oldScript.src;
                    document.body.appendChild(newScript);
                } else if (oldScript.textContent && !oldScript.src.includes('router')) {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                }
            });
            
            // Réinitialiser les événements Bootstrap
            if (typeof bootstrap !== 'undefined') {
                // Forcer la réinitialisation des offcanvas
                document.querySelectorAll('.offcanvas').forEach(el => {
                    const offcanvas = bootstrap.Offcanvas.getInstance(el);
                    if (offcanvas) offcanvas.hide();
                });
            }
            
            currentContent = route;
            
        } catch (error) {
            console.error('Erreur de chargement:', error);
            const appContainer = document.getElementById('app-content');
            if (appContainer) {
                appContainer.innerHTML = `
                    <div class="container-main">
                        <div class="welcome-card text-center">
                            <i class="fa-solid fa-circle-exclamation fa-4x text-danger mb-3"></i>
                            <h2 class="text-danger">Erreur de chargement</h2>
                            <p class="text-muted">Impossible de charger la page demandée.</p>
                            <a href="/" class="btn btn-custom btn-article mt-3">Retour à l'accueil</a>
                        </div>
                    </div>
                `;
            }
        } finally {
            showLoader(false);
        }
    }
    
    // Fonction pour la page d'accueil (spéciale)
    function loadHomePage() {
        const homeContent = `
            <div class="container-main">
                <div class="welcome-card glass-effect">
                    <div class="text-center">
                        <div class="animated-icon">
                            <i class="fa-solid fa-qrcode"></i>
                        </div>
                        <h1 class="main-title typing-text">Mon Assistant Codes</h1>
                        <p class="welcome-text">
                            <i class="fa-regular fa-hand-peace me-2"></i>
                            Bienvenue ! Gérez facilement vos codes articles et codes balance (PLU) en quelques clics.
                        </p>
                        <div class="d-flex justify-content-center gap-2 mb-4">
                            <span class="badge bg-success rounded-pill">✓ Rapide</span>
                            <span class="badge bg-info rounded-pill">✓ Simple</span>
                            <span class="badge bg-warning rounded-pill">✓ Efficace</span>
                        </div>
                        <div class="d-grid gap-3">
                            <div class="position-relative">
                                <a href="/articles" class="btn btn-custom btn-article w-100" data-route>
                                    <i class="fa-solid fa-box-open"></i>
                                    Recherche Code Article
                                </a>
                            </div>
                            <div class="position-relative">
                                <a href="/balance" class="btn btn-custom btn-balance w-100" data-route>
                                    <i class="fa-solid fa-apple-whole"></i>
                                    Recherche Code Balance (PLU)
                                </a>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-top">
                            <small class="text-muted">
                                <i class="fa-regular fa-clock me-1"></i>
                                Accès direct à vos outils de recherche
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        const appContainer = document.getElementById('app-content');
        if (appContainer) {
            appContainer.innerHTML = homeContent;
        }
        
        // Réattacher les événements après chargement
        attachRouterEvents();
    }
    
    // Attacher les événements pour la navigation
    function attachRouterEvents() {
        document.querySelectorAll('a[data-route], a[href="/articles"], a[href="/balance"], a[href="/"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const href = link.getAttribute('href');
                if (href === '/articles') {
                    window.history.pushState({}, '', '/articles');
                    loadContent('/articles');
                } else if (href === '/balance') {
                    window.history.pushState({}, '', '/balance');
                    loadContent('/balance');
                } else if (href === '/' || href === '/accueil') {
                    window.history.pushState({}, '', '/');
                    loadHomePage();
                    attachRouterEvents();
                }
            });
        });
    }
    
    // Gestion du bouton retour/avant du navigateur
    window.addEventListener('popstate', () => {
        const path = window.location.pathname;
        if (path === '/articles') {
            loadContent('/articles');
        } else if (path === '/balance') {
            loadContent('/balance');
        } else {
            loadHomePage();
            attachRouterEvents();
        }
    });
    
    // Chargement initial basé sur l'URL
    const initialPath = window.location.pathname;
    if (initialPath === '/articles') {
        loadContent('/articles');
    } else if (initialPath === '/balance') {
        loadContent('/balance');
    } else {
        loadHomePage();
        attachRouterEvents();
    }
    
    // Génération des particules
    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        if (!particlesContainer) return;
        
        const particleCount = 50;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 8 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            const duration = Math.random() * 10 + 5;
            particle.style.animationDuration = duration + 's';
            const delay = Math.random() * 5;
            particle.style.animationDelay = delay + 's';
            particlesContainer.appendChild(particle);
        }
    }
    
    // Effet de bienvenue
    setTimeout(() => {
        Swal.fire({
            title: 'Bienvenue !',
            text: 'Choisissez l\'outil qui correspond à votre besoin',
            icon: 'success',
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            background: '#ffffff',
            iconColor: '#38ef7d'
        });
    }, 500);
    
    // Initialiser les particules
    createParticles();
})();
</script>

</body>
</html>
